<!-- Membership Form Modal -->
<div class="modal fade" id="addMembershipModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{{ url_for('add_membership') }}">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Membership</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="addMembershipTitle" class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="addMembershipTitle" name="title" required placeholder="e.g., Pro Plan, Basic Membership">
                        <div class="form-text">Required - name for this membership</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="addMembershipNotes" class="form-label">Notes</label>
                        <textarea class="form-control" id="addMembershipNotes" name="notes" rows="4" placeholder="Optional notes - supports Markdown formatting"></textarea>
                        <div class="form-text">You can use **bold**, *italic*, and other Markdown formatting</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Membership</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Membership Modal -->
<div class="modal fade" id="editMembershipModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" id="editMembershipForm">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Membership</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="editMembershipTitle" class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editMembershipTitle" name="title" required placeholder="e.g., Pro Plan, Basic Membership">
                        <div class="form-text">Required - name for this membership</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="editMembershipNotes" class="form-label">Notes</label>
                        <textarea class="form-control" id="editMembershipNotes" name="notes" rows="4" placeholder="Optional notes - supports Markdown formatting"></textarea>
                        <div class="form-text">You can use **bold**, *italic*, and other Markdown formatting</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Membership</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function editMembership(membershipId, title, notes) {
    // Populate form fields
    document.getElementById('editMembershipTitle').value = title || '';
    document.getElementById('editMembershipNotes').value = notes || '';
    
    // Set form action
    document.getElementById('editMembershipForm').action = `/edit_membership/${membershipId}`;
    
    // Show modal
    new bootstrap.Modal(document.getElementById('editMembershipModal')).show();
}
</script>
